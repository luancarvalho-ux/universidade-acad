f-", "obs": null}];

function clean(s){ return (s||"").toString().replace(/\s+\n/g,"\n").replace(/\n+/g," ").replace(/\s+/g," ").trim(); }
function multiline(s){ return (s||"").toString().split("\n").map(x=>x.trim()).filter(Boolean); }
function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

const items = DATA.map(d => ({
  ...d,
  tp: clean(d.tp), tf: clean(d.tf), subtema: clean(d.subtema),
  resumo: clean(d.resumo),
  aprendizadosList: multiline(d.aprendizados).map(x=>x.replace(/^•\s*/,"")),
  tagsList: multiline((d.tags||"").replace(/,/g,"\n")).filter(Boolean)
}));

function uniq(key){ return [...new Set(items.map(i=>i[key]).filter(Boolean))].sort(); }

function populateSelect(id, values){
  const el = document.getElementById(id);
  values.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; el.appendChild(o); });
}
populateSelect('fTema', uniq('tema'));
populateSelect('fTrilha', uniq('trilha'));
populateSelect('fPublico', uniq('publico'));
populateSelect('fNivel', uniq('nivel'));

function renderStats(){
  const trilhas = uniq('trilha').length;
  const stats = [
    [items.length, 'conteúdos curados'],
    [trilhas, 'trilhas ativas']
  ];
  document.getElementById('statRow').innerHTML = stats.map(s =>
    '<div class="stat"><span class="num">'+s[0]+'</span><span class="lab">'+s[1]+'</span></div>'
  ).join('');
}
renderStats();

function cardHtml(i){
  return '<div class="card" data-id="'+esc(i.id)+'">' +
    '<div class="card-tab"><span class="id">'+esc(i.id)+'</span><span class="prio">'+esc(i.prioridade||'')+'</span></div>' +
    '<div class="card-body">' +
      '<h3 class="card-title">'+esc(i.tf||i.tp)+'</h3>' +
      '<div class="card-meta">'+esc(i.palestrante)+' · '+esc(i.fonte)+' · '+esc(i.ano)+'</div>' +
      '<p class="card-resumo">'+esc(i.resumo)+'</p>' +
      '<div class="tag-row"><span class="tag theme">'+esc(i.tema)+'</span><span class="tag">'+esc(i.nivel)+'</span><span class="tag">'+esc(i.publico)+'</span></div>' +
    '</div></div>';
}

function applyFilters(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const tema = document.getElementById('fTema').value;
  const trilha = document.getElementById('fTrilha').value;
  const publico = document.getElementById('fPublico').value;
  const nivel = document.getElementById('fNivel').value;
  const filtered = items.filter(i => {
    if(tema && i.tema!==tema) return false;
    if(trilha && i.trilha!==trilha) return false;
    if(publico && i.publico!==publico) return false;
    if(nivel && i.nivel!==nivel) return false;
    if(q){
      const hay = (i.id+' '+i.tf+' '+i.tp+' '+i.palestrante+' '+i.tema+' '+i.subtema+' '+i.resumo).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('grid').innerHTML = filtered.map(cardHtml).join('');
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('countLine').textContent = filtered.length + ' de ' + items.length + ' conteúdos exibidos';
  document.querySelectorAll('.card').forEach(c => c.addEventListener('click', () => openDetail(c.getAttribute('data-id'))));
}

['search','fTema','fTrilha','fPublico','fNivel'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
  document.getElementById(id).addEventListener('change', applyFilters);
});

function openDetail(id){
  const i = items.find(x => x.id === id);
  if(!i) return;
  const panel = document.getElementById('panel');
  panel.innerHTML =
    '<div class="panel-grad"></div>' +
    '<div class="panel-inner">' +
    '<button class="close" id="closeBtn" aria-label="Fechar">&times;</button>' +
    '<div class="id">'+esc(i.id)+' · '+esc(i.idAtivo||'')+'</div>' +
    '<h2>'+esc(i.tf||i.tp)+'</h2>' +
    '<div class="meta">'+esc(i.palestrante)+' <span>·</span> '+esc(i.fonte)+' <span>·</span> '+esc(i.ano)+' <span>·</span> '+esc(i.tcIni)+'–'+esc(i.tcFim)+'</div>' +
    '<div class="tag-row">' +
      '<span class="tag theme">'+esc(i.tema)+'</span><span class="tag">'+esc(i.subtema)+'</span>' +
      '<span class="tag">'+esc(i.nivel)+'</span><span class="tag">'+esc(i.publico)+'</span><span class="tag">'+esc(i.trilha)+'</span>' +
    '</div>' +
    '<div class="section-lab">Resumo</div><p>'+esc(i.resumo)+'</p>' +
    (i.aprendizadosList.length ? '<div class="section-lab">Principais aprendizados</div><ul>'+i.aprendizadosList.map(a=>'<li>'+esc(a)+'</li>').join('')+'</ul>' : '') +
    (i.materiais ? '<div class="section-lab">Materiais complementares</div><p>'+esc(clean(i.materiais))+'</p>' : '') +
    (i.obs ? '<div class="section-lab">Observações editoriais</div><p>'+esc(clean(i.obs))+'</p>' : '') +
    '<div class="footer-row">' +
      (i.tagsList.length ? i.tagsList.map(t=>'<span class="tag">'+esc(t)+'</span>').join('') : '') +
    '</div>' +
    (i.link ? '<a class="btn-link" href="'+esc(i.link)+'" target="_blank" rel="noopener">Abrir material de origem →</a>' : '') +
    '</div>';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('closeBtn').addEventListener('click', closeDetail);
}
function closeDetail(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', (e) => { if(e.target.id==='overlay') closeDetail(); });
document.addEventListener('keydown', (e) => { if(e.key==='Escape') closeDetail(); });

applyFilters();
</script>
